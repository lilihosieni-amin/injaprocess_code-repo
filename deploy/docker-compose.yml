# Full stack (ARD §16). `docker compose up -d` from /opt/inja/code-repo/deploy.
# Build context is the code-repo root (..). data-repo + secrets + keys are host paths.
name: inja-food-process

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest   # community image; entrypoint builds the args from env
    restart: unless-stopped
    env_file: [/opt/inja/secrets/telegram-bot-api.env]   # TELEGRAM_API_ID / TELEGRAM_API_HASH
    environment:
      TELEGRAM_LOCAL: "1"          # --local mode (up to 2 GB files); serves on :8081
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

  upload-bot:
    build:
      context: ..
      dockerfile: deploy/upload-bot.Dockerfile
    image: inja-upload-bot
    restart: unless-stopped
    depends_on: [telegram-bot-api]
    env_file: [/opt/inja/secrets/upload-bot.env]         # TELEGRAM_BOT_TOKEN, ALLOWED_USER_IDS
    environment:
      DATA_ROOT: /data
      TELEGRAM_API_BASE_URL: http://telegram-bot-api:8081
    volumes:
      - /opt/inja/data-repo:/data
      # local-mode Bot API downloads land in the bot-api server's data dir and
      # getFile returns an absolute path there — mount it (ro) so upload-bot can
      # read the file at that path.
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro

  control-bot:
    build:
      context: ..
      dockerfile: deploy/control-bot.Dockerfile
    image: inja-control-bot
    restart: unless-stopped
    env_file: [/opt/inja/secrets/control-bot.env]        # TELEGRAM_BOT_TOKEN, ALLOWED_USERS, budgets…
    environment:
      APPROVED_DIRECTORY: /data
      # Disable Claude Code's auto-backgrounding/deferral of Task subagents. On this
      # 2-CPU host the extract subagents run 60–110s; Claude Code was deferring the
      # long ones (interrupted_turn → injected "Continue from where you left off." →
      # "No response requested." stop_sequence), stalling /process-voice mid-extract
      # and forcing manual "ادامه بده" nudges. The pipeline wants agents to run
      # synchronously to completion, so background-tasking is pure downside here.
      CLAUDE_CODE_DISABLE_BACKGROUND_TASKS: "1"
    # AC-7 is enforced by the Phase-3 in-container hooks + the bot's can_use_tool
    # callback (setting_sources=["project"], approved_directory=/data): the agent's
    # file operations are confined to /data, and the engine CLIs/code are baked
    # OUTSIDE it (/usr/local/bin, /opt). NOTE: `read_only: true` was attempted for
    # extra defense-in-depth but the Claude CLI's persistent SDK client needs a
    # writable ~/.claude.json in the root home, which cannot be isolated as writable
    # without shadowing the baked bot at /root/.local — so it is intentionally NOT
    # set; the hook + callback confinement is the real guarantee.
    volumes:
      - /opt/inja/data-repo:/data
      - claude-credentials:/root/.claude   # subscription credential (rw)
      - control-bot-state:/state           # bot SQLite state — DATABASE_URL=sqlite:////state/bot.db

  ui-backend:
    build:
      context: ..
      dockerfile: deploy/ui-backend.Dockerfile
    image: inja-ui-backend
    restart: unless-stopped
    env_file: [/opt/inja/secrets/ui-backend.env]         # SESSION_SIGNING_KEY, UI_USERS_FILE
    environment:
      DATA_ROOT: /data
      UI_USERS_FILE: /run/secrets/ui-users.json
    volumes:
      - /opt/inja/data-repo:/data
      - /opt/inja/secrets/ui-users.json:/run/secrets/ui-users.json:ro

  proxy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [ui-backend]
    ports:
      - "443:443"
    volumes:
      - /opt/inja/code-repo/deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    # note: Caddy's own state lives in the caddy-data volume; distinct from data-repo

  git-push:
    build:
      context: ..
      dockerfile: deploy/git-push.Dockerfile
    image: inja-git-push
    restart: unless-stopped
    # These must match the script defaults in git-push-if-needed.sh: busybox crond
    # does not pass container env into cron jobs, so the script relies on its own
    # defaults (DATA_REPO=/data, GIT_BRANCH=main, DEPLOY_KEY=/keys/id_deploy).
    environment:
      DATA_REPO: /data
      GIT_BRANCH: main
      DEPLOY_KEY: /keys/id_deploy
    volumes:
      - /opt/inja/data-repo:/data
      - /opt/inja/keys:/keys:ro

volumes:
  telegram-bot-api-data:
  claude-credentials:
  control-bot-state:
  caddy-data:
